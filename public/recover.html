<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="alternate icon" href="/favicon.ico">
    <title>KuraTe - Recover Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/responsive.css?v=8.6">
    <meta name="description" content="KuraTe - Directorio de profesionales verificados.">
    <meta property="og:title" content="KuraTe Platform">
    <meta property="og:description" content="la plataforma definitiva para conectar profesionales de confianza con clientes.">
    <meta property="og:image" content="https://KuraTe.drsrv.net.ar/KuraTe_logo_black.png">
    <meta property="og:url" content="https://KuraTe.drsrv.net.ar">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#B8922E">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex, nofollow">
    <!-- SEO & Open Graph Tags -->
    <meta name="description" content="KuraTe - Directorio de profesionales verificados.">
    <meta property="og:title" content="KuraTe Platform">
    <meta property="og:description" content="la plataforma definitiva para conectar profesionales de confianza con clientes.">
    <meta property="og:image" content="https://KuraTe.drsrv.net.ar/KuraTe_logo_black.png">
    <meta property="og:url" content="https://KuraTe.drsrv.net.ar">
    <meta property="og:type" content="website">

</head>
<body class="blueprint-theme blueprint-auth-page">
    <div style="padding:1rem 1rem 0;max-width:1200px;margin:0 auto;"><a href="javascript:history.back()" class="fm-back-global">&#8592; Volver</a></div>
    <div class="container">
        <section style="display: flex; justify-content: center; padding-bottom: 100px;">
            <div class="card password-recovery-page" style="width: 100%; max-width: 440px; text-align: center;">
                <h2 class="gold-text" style="margin-bottom: 30px;">Recover Access</h2>

                <div style="text-align: center; margin-bottom: 25px;">
        <img src="/KuraTe_logo_black.png" alt="KuraTe Logo" style="height: 70px; width: auto; background-color: #000; border-radius: 8px; padding: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
    </div>
    <form id="forgotPasswordForm">
                    <p class="recovery-step-text">Confirm your email to receive a recovery code.</p>
                    <div id="forgotAlert" class="alert hidden"></div>
                    <div class="form-group">
                        <label for="forgotEmail">Email Address</label>
                        <input type="email" placeholder="Email Address" required id="forgotEmail" autocomplete="username">
                    </div>
                    <button type="submit" class="landing-btn landing-btn-login sa-btn sa-btn--solid" style="width:100%; margin-top:10px;">Send recovery code</button>
                </form>

                <form id="resetPasswordForm" class="hidden">
                    <p class="recovery-step-text">Recovery code sent to:</p>
                    <p id="displayEmail" class="gold-text recovery-email-display"></p>
                    <div id="resetAlert" class="alert hidden"></div>
                    <input type="hidden" id="resetEmail">
                    <div class="form-group">
                        <label for="resetCode">6-Digit Code</label>
                        <input type="text" placeholder="6-Digit Code" required id="resetCode" maxlength="6" inputmode="numeric" autocomplete="one-time-code" class="recovery-code-input">
                    </div>
                    <div class="form-group">
                        <label for="resetNewPassword">New Password (Min 6 chars)</label>
                        <input type="password" placeholder="New Password (Min 6 chars)" required id="resetNewPassword" minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="resetConfirmPassword">Confirm Password</label>
                        <input type="password" placeholder="Confirm Password" required id="resetConfirmPassword" minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="landing-btn landing-btn-login sa-btn sa-btn--solid" style="width:100%; margin-top:20px;">Reset Password</button>
                    <p class="recovery-resend-row">
                        <button type="button" id="recoveryResendPageBtn" class="recovery-resend-link">Send new code</button>
                    </p>
                </form>

                <p style="margin-top: 20px;">
                    <a href="/index.html" style="color: var(--primary-gold);">Back to login</a>
                </p>
            </div>
        </section>
    </div>

    <script src="/js/app.js?v=8.19" type="module"></script>
    <script src="/js/adminHome.js?v=1" defer></script>
</body>
</html>
