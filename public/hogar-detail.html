<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <title data-i18n="Detalle del técnico">Detalle del técnico</title>
  <meta name="theme-color" content="#B8922E">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --gold-highlight: #F0E4C3; --gold-light: #D9BC6A; --primary-gold: #B8922E;
      --gold-mid: #967018; --gold-dark: #7A5A14; --gold-rgb: 184, 146, 46;
    }
    * { box-sizing: border-box; }
    .fm-top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 0.5rem; }
    .fm-back { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; background: transparent; color: #888; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    .fm-back:hover { color: var(--primary-gold); border-color: var(--primary-gold); }
    .fm-top-right { display: flex; align-items: center; gap: 0.5rem; }
    .fm-lang-btn { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 4px 4px 2px; cursor: pointer; line-height: 0; transition: opacity 0.2s, border-color 0.2s; }
    .fm-lang-btn.active { border-bottom-color: var(--primary-gold); opacity: 1; }
    .fm-lang-btn.inactive { opacity: 0.4; }
    .fm-lang-btn:hover { opacity: 1; }
    .fm-lang-btn img { border-radius: 2px; display: block; width: 28px; height: 21px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; margin: 0; }
    .container { max-width: 860px; margin: 0 auto; padding: 16px 16px 48px; }
    a.back { display: inline-flex; align-items: center; gap: 6px; color: var(--gold-light); text-decoration: none; font-size: 0.9rem; margin-bottom: 16px; }
    a.back:hover { color: var(--primary-gold); }
    .panel { background: #1a1a2e; border: 1px solid rgba(var(--gold-rgb), 0.35); border-radius: 14px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
    .head { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .photo { width: 120px; height: 150px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(var(--gold-rgb), 0.3); background: #111; flex: 0 0 auto; }
    .head-info h1 { color: var(--primary-gold); margin: 0 0 6px; font-size: 1.5rem; }
    .head-info .area { color: var(--gold-light); font-size: 0.9rem; margin-bottom: 6px; }
    .head-info .spec { color: #cfcfcf; font-size: 0.95rem; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    @media (max-width: 768px) {
      .badges { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .badge { justify-content: center; }
    }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(var(--gold-rgb), 0.12); border: 1px solid rgba(var(--gold-rgb), 0.4); color: var(--gold-light); border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; text-decoration: none; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
    .badge:hover { background: rgba(var(--gold-rgb), 0.25); border-color: var(--primary-gold); color: var(--primary-gold); }
    .badge img { width: 18px; height: 18px; border-radius: 50%; background: rgba(15,15,26,0.85); padding: 2px; }
    .section { margin-top: 22px; }
    .section h2 { color: var(--gold-light); font-size: 1.05rem; margin: 0 0 10px; border-bottom: 1px solid rgba(var(--gold-rgb), 0.2); padding-bottom: 6px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px 24px; font-size: 0.92rem; color: #d8d8d8; }
    .row .k { color: #9a9a9a; min-width: 130px; }
    .row .k::after { content: ": "; white-space: pre; }
    .gallery { display: flex; gap: 10px; flex-wrap: wrap; }
    .gallery img { width: 90px; height: 110px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(var(--gold-rgb), 0.3); background: #111; }
    .gallery-item { position: relative; overflow: hidden; border-radius: 8px; }
    .gallery-item img { display: block; }
    .wm { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; font-weight: 800; font-size: 0.95rem; letter-spacing: 2px; color: rgba(255,255,255,0.6); text-shadow: 0 1px 3px rgba(0,0,0,0.85); background: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 10px, rgba(0,0,0,0.15) 10px 20px); }
    .wm::after { content: 'KuraTe'; transform: rotate(-18deg); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: rgba(var(--gold-rgb), 0.1); border: 1px solid rgba(var(--gold-rgb), 0.35); color: var(--gold-light); border-radius: 8px; padding: 5px 10px; font-size: 0.85rem; }
    .contact-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; background: var(--primary-gold); color: #0f0f1a; text-decoration: none; font-weight: 700; margin-right: 10px; }
    .contact-btn:hover { background: var(--gold-light); }
    .contact-btn img { width: 20px; height: 20px; border-radius: 50%; background: rgba(15,15,26,0.85); padding: 2px; }
    .loader { text-align: center; padding: 60px 16px; color: #aaa; }
    .err { text-align: center; padding: 60px 16px; color: #e08; }
  </style>
</head>
<body>
  <div class="container">
    <div class="fm-top-bar">
      <a href="/hogar.html" class="fm-back">← <span class="fm-back-text">Volver</span></a>
      <div class="fm-top-right">
        <button class="fm-lang-btn active" id="langEs" title="Español"><img src="https://flagcdn.com/w40/ar.png" alt="ES"></button>
        <button class="fm-lang-btn inactive" id="langEn" title="English"><img src="https://flagcdn.com/w40/us.png" alt="EN"></button>
      </div>
    </div>
    <div id="detail">
      <div class="loader" data-i18n="Cargando detalle...">Cargando detalle...</div>
    </div>
  </div>

  <script>
    const API_URL = (window.API_URL || '').replace(/\/$/, '') || '';
    function apiBase() { return API_URL ? API_URL : window.location.origin + '/api/v1'; }
    function resolvePhoto(url) { return (!url || typeof url !== 'string') ? '/images/no-photo.svg' : url; }
    const NO_PHOTO = '/images/no-photo.svg';

    function esc(s) { return (s == null) ? '' : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function availabilityLabel(v) {
      return { inmediata: 'Inmediata', rapida: 'Rápida (<2 días)', puedo_esperar: '2–4 días', sin_apuro: '>4 días' }[v] || v || '';
    }
    function categoryLabel(v) {
      return { profesional_matriculado: 'Profesional matriculado', tecnico_matriculado: 'Técnico matriculado', tecnico_no_matriculado: 'Técnico no matriculado', idoneo: 'Idóneo' }[v] || v || '';
    }
    function b64decode(v) {
      if (!v) return '';
      try { return decodeURIComponent(escape(window.atob(v))); } catch (e) { return ''; }
    }

    async function load() {
      const id = new URLSearchParams(location.search).get('id');
      const root = document.getElementById('detail');
      if (!id) { root.innerHTML = '<div class="err">Falta el id del técnico.</div>'; return; }
      try {
        const res = await fetch(apiBase() + '/hogar/professionals/' + encodeURIComponent(id));
        const j = await res.json();
        if (!j.success || !j.data) { root.innerHTML = '<div class="err">' + esc(j.error || 'No encontrado') + '</div>'; return; }
        render(j.data);
      } catch (e) {
        root.innerHTML = '<div class="err">Error al cargar: ' + esc(e.message) + '</div>';
      }
    }

    function render(d) {
      const hp = d.hogarProfile || d;
      const rawContact = d.contact || hp.contact || {};
      const contact = {
        whatsapp: rawContact.whatsapp,
        telegram: rawContact.telegram,
        mobilePhone: b64decode(rawContact.mobilePhone),
        email: b64decode(rawContact.email),
        telegramId: b64decode(rawContact.telegramId || rawContact.telegram)
      };
      const addr = hp.address || {};
      const photos = (hp.photos && hp.photos.length) ? hp.photos : [NO_PHOTO];
      const services = hp.services || [];
      const location = (addr.province || '').toLowerCase() === 'caba'
        ? [addr.neighborhood, 'CABA'].filter(Boolean).join(', ')
        : [addr.neighborhood, addr.city].filter(Boolean).join(', ');

      const phoneDigits = String(contact.mobilePhone || '').replace(/[^0-9]/g, '');
      const telHref = 'tel:' + encodeURIComponent(String(contact.mobilePhone || '').replace(/[^0-9+]/g, ''));
      const waHref = 'https://wa.me/' + phoneDigits;
      const tgUser = (typeof contact.telegramId === 'string' && contact.telegramId.trim()) ? contact.telegramId.trim().replace(/[^0-9a-zA-Z_]/g, '') : '';
      const tgHref = 'https://t.me/' + tgUser;
      const mailHref = 'mailto:' + encodeURIComponent(contact.email || '');

      const badges = [];
      if (contact.whatsapp) badges.push('<a class="badge" href="' + waHref + '" target="_blank" rel="noopener"><img src="/images/whatsapp.png" alt="WhatsApp"> WhatsApp</a>');
      if (contact.telegram) badges.push('<a class="badge" href="' + tgHref + '" target="_blank" rel="noopener"><img src="/images/Telegram.png" alt="Telegram"> Telegram</a>');
      if (contact.mobilePhone) badges.push('<a class="badge" href="' + telHref + '"><img src="data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23fff\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z\'/></svg>" alt="Teléfono"> Teléfono</a>');
      if (contact.email) badges.push('<a class="badge" href="' + mailHref + '"><img src="data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23fff\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'2\' y=\'4\' width=\'20\' height=\'16\' rx=\'2\'/><path d=\'M22 7l-10 6L2 7\'/></svg>" alt="Email"> Email</a>');

      const otherContacts = [];
      if (contact.email) otherContacts.push('<a class="contact-btn" href="mailto:' + encodeURIComponent(contact.email) + '">Email</a>');
      if (contact.mobilePhone) otherContacts.push('<a class="contact-btn" href="tel:' + encodeURIComponent(String(contact.mobilePhone).replace(/[^0-9+]/g, '')) + '">Teléfono</a>');

      const gallery = photos.map((p, i) => {
        const img = '<img src="' + resolvePhoto(p) + '" alt="Foto" onerror="this.src=\'' + NO_PHOTO + '\'">';
        if (i === 0) return img;
        return '<div class="gallery-item">' + img + '<div class="wm">KuraTe</div></div>';
      }).join('');
      const svcChips = services.map(s => {
        const brands = (s.brands && s.brands.length) ? ' (' + s.brands.join(', ') + ')' : '';
        return '<span class="chip">' + esc(s.name || s.path) + esc(brands) + '</span>';
      }).join('');

      document.getElementById('detail').innerHTML = `
        <div class="panel">
          <div class="head">
            <img class="photo" src="${resolvePhoto(photos[0])}" alt="${esc(d.name)}" onerror="this.src='${NO_PHOTO}'">
            <div class="head-info">
              <h1>${esc(d.name)}</h1>
              <div class="area">${esc(categoryLabel(hp.category))} · ${esc(labelArea(hp.area))}</div>
              <div class="spec">${esc(hp.specialty || '')}</div>
              <div class="badges">${badges.join('')}</div>
            </div>
          </div>

          ${hp.action ? `<div class="section"><h2 data-i18n="Qué hace">Qué hace</h2><div class="row"><div><strong>${esc(hp.action)}</strong>${hp.actionDetails ? ' — ' + esc(hp.actionDetails) : ''}</div></div></div>` : ''}

          <div class="section"><h2 data-i18n="Detalles">Detalles</h2><div class="row">
            ${hp.companyName ? `<div><span class="k" data-i18n="Empresa">Empresa</span>${esc(hp.companyName)}</div>` : ''}
            ${hp.category ? `<div><span class="k" data-i18n="Categoría">Categoría</span>${esc(categoryLabel(hp.category))}</div>` : ''}
            ${hp.availability ? `<div><span class="k" data-i18n="Disponibilidad">Disponibilidad</span>${esc(availabilityLabel(hp.availability))}</div>` : ''}
            ${location ? `<div><span class="k" data-i18n="Zona">Zona</span>${esc(location)}</div>` : ''}
            ${addr.street ? `<div><span class="k" data-i18n="Dirección">Dirección</span>${esc(addr.street)} ${esc(addr.number || '')}</div>` : ''}
          </div></div>

          ${svcChips ? `<div class="section"><h2 data-i18n="Servicios">Servicios</h2><div class="chips">${svcChips}</div></div>` : ''}

          <div class="section"><h2 data-i18n="Fotos">Fotos</h2><div class="gallery">${gallery}</div></div>

        </div>`;
    }

    function labelArea(a) {
      return { hogar: 'Hogar', oficina: 'Oficina', pime: 'PIME', industria: 'Industria' }[a] || a || '';
    }

    // Language switch (shared with landing page) — persists preference, translates labels
    (function () {
      const dict = {
        'Volver': 'Back',
        'Detalle del técnico': 'Technician details',
        'Qué hace': 'What they do',
        'Detalles': 'Details',
        'Servicios': 'Services',
        'Fotos': 'Photos',
        'Contacto': 'Contact',
        'Empresa': 'Company', 'Categoría': 'Category', 'Disponibilidad': 'Availability',
        'Zona': 'Area', 'Dirección': 'Address',
        'Inmediata': 'Immediate', 'Rápida (<2 días)': 'Quick (<2 days)', '2–4 días': '2–4 days', '>4 días': '>4 days',
        'Profesional matriculado': 'Licensed professional', 'Técnico matriculado': 'Licensed technician',
        'Técnico no matriculado': 'Unlicensed technician', 'Idóneo': 'Qualified',
        'Hogar': 'Home', 'Oficina': 'Office', 'PIME': 'SME', 'Industria': 'Industry',
        'WhatsApp disponible': 'WhatsApp available', 'Telegram disponible': 'Telegram available',
        'Sin datos de contacto públicos.': 'No public contact info.',
        'Cargando detalle...': 'Loading details...', 'Falta el id del técnico.': 'Missing technician id.'
      };
      const lang = localStorage.getItem('platform_lang') || 'es';
      const esBtn = document.getElementById('langEs');
      const enBtn = document.getElementById('langEn');
      if (esBtn && enBtn) {
        esBtn.className = 'fm-lang-btn ' + (lang === 'es' ? 'active' : 'inactive');
        enBtn.className = 'fm-lang-btn ' + (lang === 'en' ? 'active' : 'inactive');
      }
      function translate() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          el.textContent = (lang === 'en' && dict[key]) ? dict[key] : key;
        });
        document.querySelectorAll('.fm-back-text').forEach(el => { el.textContent = (lang === 'en') ? 'Back' : 'Volver'; });
      }
      translate();
      if (esBtn) esBtn.addEventListener('click', () => { localStorage.setItem('platform_lang', 'es'); location.reload(); });
      if (enBtn) enBtn.addEventListener('click', () => { localStorage.setItem('platform_lang', 'en'); location.reload(); });
    })();

    load();
  </script>
</body>
</html>
