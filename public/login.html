<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico">
    <title>KuraTe - Professional Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=8.25">
    <link rel="stylesheet" href="/css/blueprint.css?v=2">
    <link rel="stylesheet" href="/css/responsive.css?v=8.11">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#B8922E">
    <meta name="color-scheme" content="dark">
    <!-- SEO & Open Graph Tags -->
    <meta name="description" content="KuraTe - Directorio de profesionales verificados.">
    <meta property="og:title" content="KuraTe Platform">
    <meta property="og:description" content="la plataforma definitiva para conectar profesionales de confianza con clientes.">
    <meta property="og:image" content="https://KuraTe.drsrv.net.ar/KuraTe_logo_black.png">
    <meta property="og:url" content="https://KuraTe.drsrv.net.ar">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#D4AF37">
</head>
<body class="landing-page login-page blueprint-theme blueprint-login-page">
    <div style="padding:1rem 1rem 0;"><a href="javascript:history.back()" class="fm-back-global">&#8592; Volver</a></div>
    <div class="container landing-container">
        <section class="hero landing-dual" id="loginPage">
            <div class="landing-frame landing-frame-logo">
                <div class="landing-frame-inner brand-logo-block">
                    <img class="landing-logo" src="/KuraTe_logo_black.png" alt="KuraTe Logo">
                    <p class="brand-services-tagline">¿Qué necesitás?, </p>
                </div>
            </div>

            <div class="landing-frame landing-frame-auth landing-login-card">
                <div class="landing-frame-inner landing-auth-inner">
                    <h2 class="gold-text landing-login-heading">Professional Login</h2>
                    <p class="landing-login-sub">Sign in with your model account email.</p>

                    <div style="text-align: center; margin-bottom: 25px;">
        <img src="/KuraTe_logo_black.png" alt="KuraTe Logo" style="height: 70px; width: auto; background-color: #000; border-radius: 8px; padding: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
    </div>
    <form id="loginForm" class="landing-login-form">
                        <div id="loginAlert" class="alert hidden"></div>
                        <div id="loginGoogleMount" class="google-signin-mount" aria-label="Google sign-in"></div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" placeholder="Email Address" required id="email" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" placeholder="Password" required id="password" autocomplete="current-password">
                        </div>
                        <button type="submit" class="landing-btn landing-btn-login sa-btn sa-btn--solid">Enter Sanctuary</button>
                    </form>

                    <p class="landing-forgot">
                        <a href="/recover.html" data-open-password-recovery>Forgot Password?</a>
                    </p>

                    <p class="landing-register-link">
                        Don't have an access yet?
                        <a href="/register.html">Register as a model</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/app.js?v=8.25" type="module"></script>
    <script src="/js/adminHome.js?v=1" defer></script>
</body>
</html>
