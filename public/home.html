    <meta property="og:title" content="FullMinent Platform">
    <meta property="og:description" content="la plataforma definitiva para conectar profesionales de confianza con clientes.">

<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="logo"><img src="/FullMinent_logo_black.png" alt="FullMinent Logo" class="page-logo"></a>
            <nav class="page-nav">
                <a href="login.html" id="proEntranceBtn" style="color: var(--primary-gold); margin: 0 15px; text-decoration: none;">Model Entrance</a>
                <a href="#" id="logoutBtn" style="color: var(--accent-red); margin: 0 15px; text-decoration: none;">Exit</a>
            </nav>
        </header>

        <section id="discovery" style="margin-top: 50px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 class="gold-text" style="font-size: 2.5rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px;">Professionals</h2>
                <p style="color: #aaa; font-size: 1.1rem;">Explore our veiled collection of verificados companions.</p>
            </div>
            
            <div class="treasure-grid-slot" id="treasureGridSlot">
                <div id="pageLoader"><p>Unveiling the collection...</p></div>
                <div id="treasureGrid" class="grid hidden"></div>
            </div>
        </section>
    </div>

    <script src="/js/app.js?v=8.7" type="module"></script>
    <script src="/js/adminHome.js?v=1" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user.role === 'professional' || user.role === 'admin') {
                        const proBtn = document.getElementById('proEntranceBtn');
                        proBtn.textContent = 'My Dashboard';
                        proBtn.href = 'dashboard.html';
                    }
                } catch(e) {}
            }
        });
    </script>
