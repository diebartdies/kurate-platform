<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuraTe — Opinión</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #121212; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #1e1e1e; border-radius: 12px; padding: 2rem; max-width: 420px; width: 90%; text-align: center; }
h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #B8922E; }
p { color: #aaa; margin-bottom: 1.5rem; font-size: 0.9rem; }
.stars { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
.stars button { background: none; border: none; font-size: 2rem; cursor: pointer; color: #555; transition: color 0.2s; }
.stars button.active { color: #f1c40f; }
textarea { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #eee; font-size: 0.9rem; resize: vertical; min-height: 80px; margin-bottom: 1rem; }
button.submit { background: #B8922E; color: #121212; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; }
button.submit:disabled { opacity: 0.5; cursor: default; }
.msg { margin-top: 1rem; font-size: 0.9rem; }
.msg.ok { color: #2ecc71; }
.msg.err { color: #e74c3c; }
.logo { height: 48px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="/KuraTe_logo_black.png" alt="KuraTe">
  <h1>¿Cómo fue tu experiencia?</h1>
  <p>Tu opinión nos ayuda a mejorar. Calificá del 1 al 5.</p>
  <div class="stars" id="stars">
    <button data-star="1">★</button>
    <button data-star="2">★</button>
    <button data-star="3">★</button>
    <button data-star="4">★</button>
    <button data-star="5">★</button>
  </div>
  <textarea id="comment" placeholder="Comentario (opcional)"></textarea>
  <button class="submit" id="submitBtn" disabled>Enviar opinión</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const feedbackId = params.get('id');
let selectedRating = 0;

document.querySelectorAll('.stars button').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedRating = parseInt(btn.dataset.star);
    document.querySelectorAll('.stars button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.star) <= selectedRating));
    document.getElementById('submitBtn').disabled = false;
  });
});

document.getElementById('submitBtn').addEventListener('click', async () => {
  if (!feedbackId || !selectedRating) return;
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = '';
  try {
    const r = await fetch('/api/v1/feedback/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: feedbackId, rating: selectedRating, comment: document.getElementById('comment').value })
    });
    const data = await r.json();
    if (r.ok) { msg.className = 'msg ok'; msg.textContent = '¡Gracias por tu opinión!'; }
    else { msg.className = 'msg err'; msg.textContent = data.error || 'Error.'; btn.disabled = false; }
  } catch { msg.className = 'msg err'; msg.textContent = 'Error de conexión.'; btn.disabled = false; }
});
</script>
</body>
</html>
