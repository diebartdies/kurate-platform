services:
  mongo:
    image: mongo:4.4
    pull_policy: if_not_present
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25", "--bind_ip_all"]
    container_name: KuraTe_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    build:
      context: .
      args:
        INSTALL_TWILIO: "${INSTALL_TWILIO:-1}"
    container_name: KuraTe_app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/KuraTe
    volumes:
      - ./public:/app/public
      - ./controllers:/app/controllers
      - ./services:/app/services
      - ./models:/app/models
      - ./middleware:/app/middleware
      - ./utils:/app/utils
      - ./config:/app/config
      - ./data:/app/data
      - ./server.js:/app/server.js
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: KuraTe_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./KurateCerts:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf/live:/etc/nginx/certs-live:ro
      - ./certbot/conf/archive:/etc/nginx/archive:ro
    depends_on:
      - app

volumes:
  mongo_data:
    name: KuraTe_mongo_data